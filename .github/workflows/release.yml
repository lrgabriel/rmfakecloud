name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Bump version and create release
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        run: |
          if [ -f version.txt ]; then
            current=$(cat version.txt)
          else
            current="0.0.0"
          fi

          major=$(echo "$current" | cut -d. -f1)
          minor=$(echo "$current" | cut -d. -f2)
          patch=$(echo "$current" | cut -d. -f3)

          case "${{ inputs.version_bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          echo "$new_version" > version.txt
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          new_version="${{ steps.bump.outputs.new_version }}"
          tag="v${new_version}"

          # Get last tag
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$last_tag" ]; then
            commits=$(git log "${last_tag}..HEAD" --pretty=format:"%s" --no-merges)
          else
            commits=$(git log --pretty=format:"%s" --no-merges)
          fi

          feat=""
          fix=""
          docs=""
          other=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            if echo "$line" | grep -qE '^feat(\(.+\))?!?:'; then
              feat="${feat}- ${line}\n"
            elif echo "$line" | grep -qE '^fix(\(.+\))?!?:'; then
              fix="${fix}- ${line}\n"
            elif echo "$line" | grep -qE '^docs(\(.+\))?!?:'; then
              docs="${docs}- ${line}\n"
            else
              other="${other}- ${line}\n"
            fi
          done <<< "$commits"

          {
            echo "# ${tag}"
            echo ""
            if [ -n "$feat" ]; then
              echo "## Features"
              echo ""
              printf "%b" "$feat"
              echo ""
            fi
            if [ -n "$fix" ]; then
              echo "## Bug Fixes"
              echo ""
              printf "%b" "$fix"
              echo ""
            fi
            if [ -n "$docs" ]; then
              echo "## Documentation"
              echo ""
              printf "%b" "$docs"
              echo ""
            fi
            if [ -n "$other" ]; then
              echo "## Other Changes"
              echo ""
              printf "%b" "$other"
              echo ""
            fi
          } > RELEASE_NOTES.md

      - name: Update CHANGELOG.md
        run: |
          if [ -f CHANGELOG.md ]; then
            cat RELEASE_NOTES.md CHANGELOG.md > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            cp RELEASE_NOTES.md CHANGELOG.md
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt CHANGELOG.md
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }}"
          git pull --rebase origin master
          git push

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.new_version }}" \
            --title "v${{ steps.bump.outputs.new_version }}" \
            --notes-file RELEASE_NOTES.md

  build:
    name: Build Docker image
    needs: release
    uses: ./.github/workflows/docker-build.yml
    with:
      version: ${{ needs.release.outputs.new_version }}
    secrets: inherit
